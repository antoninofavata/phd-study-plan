  # ======================
  # FASE B - Mechanics of Solids and Structures
  # ======================

  - id: B1
    name: "Variational methods for solid mechanics: elasticity plasticity and damage"
    phase: B
    sector: "Mechanics of Solids and Structures"
    years: [2025]
    professor: "Stefano Vidoli"
    description: |
      The course aims to provide PhD students with advanced mathematical tools necessary for formulating and solving 
      complex problems in solid and structural mechanics. Starting from the foundations of functional analysis, 
      the program will explore how variational methods make it possible to extend the search for solutions to problems 
      that do not admit a classical treatment, with particular attention to nonlinear phenomena such as damage and plasticity.
    program: |    
      1. *Introduction to Variational Methods*
      
      - Limitations of the classical formulation of partial differential equations (PDEs).
      - Why variational methods? Extension of the concept of solution and weak formulations.
      
      2. *Formulation of the Classical Elasticity Problem*
      
      - Review of continuum mechanics.
      - Total potential energy and the principle of virtual work.
      - Variational formulation of the linear elastic problem.
      
      3. *Functional Spaces and Distribution Theory*
      
      - Normed vector spaces and completeness: Banach and Hilbert spaces.
      - Sobolev spaces; embedding and trace theorems.
      
      4. *Variational Inequalities: Damage and Plasticity*
      
      - Constrained minimization problems and convexity.
      - Introduction to variational inequalities.
      - Applications to nonlinear mechanics: damage and material plasticity models.
      
      5. *Numerical Methods and Well-Posedness Analysis*
      
      - Existence and uniqueness of the solution.
      - The concept of coercivity and continuity in an engineering context.
      - Galerkin approximation and mathematical foundations of the Finite Element Method.
      
      6. *Locking Phenomena and Mixed Methods*
      
      - Analysis of the numerical “locking” problem.
      - Introduction to mixed variational methods. Stability conditions (Inf-Sup).


    


  - id: B2
    name: "Linear and nonlinear structural dynamics"
    phase: B
    sector: "Mechanics of Solids and Structures"
    years: [2025]
    professor: "Andrea Arena"
    description: |
        The course aims to provide the fundamental knowledge needed to understand the linear and nonlinear dynamic behavior of structures. 
        The introduction will focus on the modeling of dynamic systems, including the identification of kinematic descriptors of motion, 
        the characterization of the constitutive behavior of a structure, and the actions acting upon it.
        Paradigmatic structural models will be introduced to discuss the main dynamic phenomena that arise in both linear and nonlinear regimes. 
        Applications will also be presented, with reference to case studies implemented in software capable of performing symbolic analysis.
    program: |
      *Introduction*
      
      The dynamic model of a structure: kinematic parameters describing motion; rheological models representing the constitutive behavior of structures; actions acting on structures. Linear and nonlinear structural models; equations of motion.
     
      *Linear Dynamics*
      
      Harmonic motion. Free dynamics of the “simple harmonic oscillator.” Effect of damping on the free dynamic response of the “simple oscillator.” State-space representation of the equations of motion. Dynamic stability of a mechanical system.
      Forced dynamics: direct resonance in harmonically excited systems. Resonance in parametrically excited systems.
      Multiple-degree-of-freedom (MDoF) systems. Modal analysis and its applications in linear dynamic systems through the modal expansion theorem.
      Harmonic excitation in multiple-degree-of-freedom systems and the concept of passive vibration control.
      Indirect actions: the case of earthquakes; analysis using the response spectrum.
  
      *Nonlinear Dynamics*
  
      The Duffing oscillator. Methods for solving nonlinear equations of motion (with particular attention to the method of multiple scales). Nonlinear normal modes. Effect of damping in nonlinear systems. Direct resonance in harmonically excited systems. Resonance in parametrically excited systems. The Van der Pol oscillator and the case of nonlinear damping.
      Multiple-degree-of-freedom systems: effects of nonlinearities in the case of internal resonances.


