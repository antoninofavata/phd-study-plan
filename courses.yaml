  # ======================
  # FASE B - Mechanics of Solids and Structures
  # ======================

  - id: B1
    name: "Variational methods for solid mechanics: elasticity plasticity and damage"
    phase: B
    sector: "Mechanics of Solids and Structures"
    years: [2025]
    professor: "Stefano Vidoli"
    description: |
      The course aims to provide PhD students with advanced mathematical tools necessary for formulating and solving 
      complex problems in solid and structural mechanics. Starting from the foundations of functional analysis, 
      the program will explore how variational methods make it possible to extend the search for solutions to problems 
      that do not admit a classical treatment, with particular attention to nonlinear phenomena such as damage and plasticity.
    program: |    
      1. *Introduction to Variational Methods*
      
      - Limitations of the classical formulation of partial differential equations (PDEs).
      - Why variational methods? Extension of the concept of solution and weak formulations.
      
      2. *Formulation of the Classical Elasticity Problem*
      
      - Review of continuum mechanics.
      - Total potential energy and the principle of virtual work.
      - Variational formulation of the linear elastic problem.
      
      3. *Functional Spaces and Distribution Theory*
      
      - Normed vector spaces and completeness: Banach and Hilbert spaces.
      - Sobolev spaces; embedding and trace theorems.
      
      4. *Variational Inequalities: Damage and Plasticity*
      
      - Constrained minimization problems and convexity.
      - Introduction to variational inequalities.
      - Applications to nonlinear mechanics: damage and material plasticity models.
      
      5. *Numerical Methods and Well-Posedness Analysis*
      
      - Existence and uniqueness of the solution.
      - The concept of coercivity and continuity in an engineering context.
      - Galerkin approximation and mathematical foundations of the Finite Element Method.
      
      6. *Locking Phenomena and Mixed Methods*
      
      - Analysis of the numerical “locking” problem.
      - Introduction to mixed variational methods. Stability conditions (Inf-Sup).


    


  - id: B2
    name: "Linear and nonlinear structural dynamics"
    phase: B
    sector: "Mechanics of Solids and Structures"
    years: [2025]
    professor: "Andrea Arena"
    description: |
        The course aims to provide the fundamental knowledge needed to understand the linear and nonlinear dynamic behavior of structures. 
        The introduction will focus on the modeling of dynamic systems, including the identification of kinematic descriptors of motion, 
        the characterization of the constitutive behavior of a structure, and the actions acting upon it.
        Paradigmatic structural models will be introduced to discuss the main dynamic phenomena that arise in both linear and nonlinear regimes. 
        Applications will also be presented, with reference to case studies implemented in software capable of performing symbolic analysis.
    program: |
      *Introduction*
      
      The dynamic model of a structure: kinematic parameters describing motion; rheological models representing the constitutive behavior of structures; actions acting on structures. Linear and nonlinear structural models; equations of motion.
     
      *Linear Dynamics*
      
      Harmonic motion. Free dynamics of the “simple harmonic oscillator.” Effect of damping on the free dynamic response of the “simple oscillator.” State-space representation of the equations of motion. Dynamic stability of a mechanical system.
      Forced dynamics: direct resonance in harmonically excited systems. Resonance in parametrically excited systems.
      Multiple-degree-of-freedom (MDoF) systems. Modal analysis and its applications in linear dynamic systems through the modal expansion theorem.
      Harmonic excitation in multiple-degree-of-freedom systems and the concept of passive vibration control.
      Indirect actions: the case of earthquakes; analysis using the response spectrum.
  
      *Nonlinear Dynamics*
  
      The Duffing oscillator. Methods for solving nonlinear equations of motion (with particular attention to the method of multiple scales). Nonlinear normal modes. Effect of damping in nonlinear systems. Direct resonance in harmonically excited systems. Resonance in parametrically excited systems. The Van der Pol oscillator and the case of nonlinear damping.
      Multiple-degree-of-freedom systems: effects of nonlinearities in the case of internal resonances.


  - id: B3
    name: "Continuum Mechanics and Thermodynamics"
    phase: B
    sector: "Mechanics of Solids and Structures"
    years: [2026]
    professor: "Antonino Favata"
    description: |
      This course offers a reasonably self-contained introduction to continuum mechanics and thermodynamics, that emphasizes the foundational role of the balance laws and the entropy inequality. These principles---along with the requirement that physical theories be frame-indifferent---serve as the essential building blocks for the formulation of theories of material behavior.
      A central part of the course is devoted to the general theory of constitutive equations, emphasizing the use of thermodynamic principles to constrain constitutive behavior. This will be developed within the framework commonly referred to as the Coleman–Noll procedure. As applications of this general framework, I will present the following topics: rigid heat conductors, elastic solids under isothermal and nonisothermal conditions. If time permits, the course will also touch upon basic aspects of rate-independent plasticity.
      Prerequisites are basic notions on calculus and  mechanics. Few nonstandard mathematical tools will be introduced with care, if necessary.
    program: |
      1. *Kinematics*
      
      Motion of a body. Deformation gradient. Homogeneous deformations. Rigid deformations. Strain measures. Polar decomposition. Change in  length, volume, and area. Motion velocity, velocity gradient, stretching, and spin. Infinitesimal theory.

      2. *Basic Mechanical Principles.*
      
      Balance of mass. Force and moments. Stress. Balance laws for linear and angular momentum. Frame of reference. Frame-indifference principle. Material symmetries.
      Referential forms for the mechanical laws: Piola stress, expended power, second Piola stress. 

      3. *Basic Thermodynamical Principles*
      
      The first law: balance of energy. The second law: non-negative production of entropy.  Basic hypotheses for developing physically meaningful constitutive theories: constitutive response functions, frame indifference and compatibility with thermodynamics, Coleman-Noll procedure.

      4. *Constitutive theory*
      
      Elastic materials. Dissipative phenomena. Rigid heat conductors, thermoelasticity. Rate-independent plasticity.
    

  - id: B4
    name: "Advanced Finite Element Methods"
    phase: B
    sector: "Mechanics of Solids and Structures"
    years: [2026]
    professor: "Daniela Addessi"
    description: |
      This course provides a comprehensive introduction to the fundamentals of the Finite Element Method
      (FEM) for the numerical solution of general mechanical problems, with particular emphasis on structural
      applications. Building on the current state of the art, the course examines selected advanced topics and
      emerging trends in the finite element modeling of both linear and nonlinear problems in computational
      mechanics. Particular attention is devoted to the identification of key challenges and the discussion of
      appropriate solution strategies, especially within the structural domain.
      
      The course begins with the presentation of the classical displacement-based formulation, which
      represents the standard approach adopted in most finite element codes. Subsequently, two-field and three-
      field mixed finite element formulations are introduced and discussed.
      
      An overview of the principal finite element families employed in the analysis of 1D, 2D, and 3D
      continuum problems is provided, including truss, frame, solid, plate, and shell elements. The formulation,
      applicability, and limitations of these element types are examined.
      The course further addresses the main sources of nonlinear behavior in structural systems, including
      material nonlinearities, as well as geometric effects such as large deformations and rotations.
      Finally, selected topics related to numerical pathologies in finite element analysis are discussed, together
      with commonly adopted solution techniques and mitigation strategies.
    program: |
        Lecture 1: Displacement-based FE formulation.
        
        Lecture 2: Multi-field mixed formulations derived from extended variational
        functionals.
        
        Lecture 3: Euler-Bernoulli and Timoshenko beam FE: forced-based approach,
        Lagrangian, Isoparametric, Serendipity FE families for 2D and 3D problems.
        
        Lecture 4: FE formulations for thin and thick plates and shells. Convergence issues,
        stress recovery, reduced integration. Shear locking problems.
        
        Lecture 5: FE nonlinear formulations including nonlinear constitutive laws and
        large displacements and strains.
        
        Lecture 6: Implementation of the FE procedure in MATLAB. Examples and
        applications on simple problems.


  # ======================
  # STRUCTURAL ENGINEERING
  # ======================

  - id: B5
    name: "Integrated seismic and energy rehabilitation of reinforced concrete buildings"
    phase: B
    sector: "Structural Engineering"
    years: [2025]
    professor: "Stefano Pampanin"
    program: |
      - Overview of the Canterbury earthquakes sequence: lessons learnt, impact on performance-based design philosophy and opportunity for a wide implementation of the next generation of damage-resisting structures
      - Alternative design philosophies and solutions for the seismic design of precast concrete structures. Emulation of cast-in situ concrete. Introduction to jointed ductile connections,  
      - Research and Development of PRESSS-concrete Technology and the hybrid system concept. Research & Development of these systems.  
      - Extension to Timber: development of multi-storey long-span prestressed timber (Pres-Lam) buildings using engineered wood materials (Glulam, LVL, Cross-Lam)
      - Examples of on-site applications worldwide of PRESSS and PRES-LAM technology in low-, medium- or high-seismic areas. Constructability aspects, sequence and detailing.
      - Cost/Performance evaluation of low-damage technologies. Resilience and Sustainability considerations

  - id: B6
    name: "Seismic Safety and Sustainability: Next Generation of Low-Damage Concrete and Timber Buildings"
    phase: B
    sector: "Structural Engineering"
    years: [2026]

  - id: B7
    name: "Masonry structures: from analytical to experimental approaches"
    phase: B
    sector: "Structural Engineering"
    years: [2026]
    professor: "Linda Giresini, Claudia Casapulla, Domenico Liberatore"
    description: |
      This course provides a comprehensive analysis of the performance of masonry structures, 
      covering both global and local approaches. Following an introduction to micro-, meso-, and macro-scale modeling based on homogenization techniques, 
      the curriculum explores state-of-the-art methods, including Discrete Element Methods (DEM), Applied Element Method (AEM), Finite Element Method (FEM), 
      and Limit Analysis (LA). It provides a deep dive into both global and local analysis, drawing on real-world examples of historic and existing buildings 
      to illustrate strengthening techniques, as well as in-plane and out-of-plane behavior and wall interlocking. 
      Furthermore, lessons learned from recent earthquakes are analyzed considering disaggregation, out-of-plane and in-plane mechanisms. 
      The course also covers traditional and advanced experimental techniques in static and dynamic fields, such as motion magnification. 
      Traditional and innovative retrofit techniques for masonry structures are explored, including injections, CRM, CAM and others). 
      Finally, non-linear dynamic rocking analyses of local mechanisms are addressed, incorporating dissipative earthquake-resistant devices.


  # ======================
  # GEOTECHNICAL ENGINEERING
  # ======================

  - id: B8
    name: "Constitutive Modelling of Geomaterials"
    phase: B
    sector: "Geotechnical Engineering"
    years: [2025]
    professor: "Angelo Amorosi"
    description: |
      This 6 days course is aimed at introducing, at the post-graduate level, the basic principles of the mechanics of soils by 
      discussing some of their experimental features and constitutive modelling strategies, with particular emphasis to clayey materials. 
      The fundamental field equations for a two-phase medium are first derived, followed by an overview of typical experimental results and 
      their interpretation in the frame of Critical State Soil Mechanics.
      
      The key ingredients of plasticity theory are then introduced, first under 1D conditions and then generalised to 3D ones, aiming at providing the general theoretical setting then adopted to illustrate a wide class of plasticity-based models for soils, ranging from standard perfectly plastic ones to more advanced mixed-hardening multi-surface formulations.
      An alternative constitutive approach based on thermodynamics with internal variables is introduced and its merits are illustrated with r
      eference to different forms of elasto-plastic coupling of soils. 
      
      Finally, the above approach is generalised and applied to the development of a micro-informed thermodynamics-based constitutive framework. 
      This is then adopted for the formulation of an innovative model accounting of double porosity and fabric of fine-grained soils.
    
    program: |
      *The soil as a two-phase continuum medium*

      Principle of effective stress. Solid-fluid compatibility. Elements of soil hydraulics. Field equations for a deformable porous medium under static conditions; 
      special cases: dry soil, saturated soil with water flow under stationary or transient conditions, undrained conditions, consolidation. Field equations under dynamic conditions.
      
      *Experimental observations*
      
      Laboratory equipment. Typical experimental observations on reconstituted clays: radial paths, deviatoric paths. 
      Dependence on the current stress state and stress history: contracting or dilating response. Critical state. Normalisation, state boundary surface and their mechanical interpretation. 
      Effects of anisotropic radial compression: experimental observations and their mechanical interpretation; relationship between macro and micro scales via 
      scanning electron microscope observations. Effects of bonding between grain aggregates on the mechanical behaviour of natural clays: experimental observations and their mechanical interpretation.
      The behaviour of clays for states far from failure: initial shear stiffness and non-linear dependence of stiffness on the amplitude of the stress/strain perturbation. 
      Experimental observations of the initial shear stiffness: dependence on the effective stress state, dependence on previous stress history, anisotropy.
      
      *Elements of plasticity theory*
      
      Elements of phenomenological one-dimensional elasto-plasticity: experimental evidence, reversibility, yielding, loading-unloading conditions, perfect plasticity, hardening.
      Elements of phenomenological multidimensional elasto-plasticity: experimental evidence, elastic domain, yielding, plastic flow, loading-unloading conditions. 
      Direct and inverse formulation of perfect plasticity. Isotropic hardening, kinematic hardening, anisotropic hardening. Direct and inverse formulation of hardening plasticity.
      
      *Plasticity-based constitutive modelling of soils*
      
      Hypo-elasticity and hyper-elasticity. The soil as an elastic-perfectly plastic medium. Simple elastoplastic models with isotropic hardening: 
      Modified Cam-Clay (MCC) and its evolutions. Cementation and mechanical debonding processes: 
      ad hoc isotropic hardening laws. Anisotropic strain history described by tensorial variables: kinematic and anisotropic hardening, mixed hardening. 
      Multi-surface hardening plasticity models.
      
      *Constitutive modelling based on thermodynamics with internal variables*
      
      Motivations. Energy and its rate under isothermal conditions. 1st Law. Legendre transform. 2nd Law. Rate of dissipation. 
      Yield functions in the generalised and Cauchy stress spaces. MCC with linear and non-linear elasticity. 
      Isotropic coupling: MCC reformulation and consequences. Anisotropic hardening: Saniclay-T. Beyond Saniclay-T: anisotropic coupling.
      
      *Micro-informed constitutive modelling of clays based on thermodynamics*
      
      Motivations. Micro-macro experimental evidences: the role of clusters of particles and related porosities and fabrics. 
      Relevant observable internal variables for clays. A double porosity and fabric framework for fine-grained soils: thermodynamics framework; energy and rate of dissipation functions; 
      equivalent single-surface hardening plasticity model; calibration of model parameters and initialisation of internal variables; validation against multiscale experimental results. 
      Final remarks. 

  - id: B9
    name: "Numerical Modelling in Geomechanics"
    phase: B
    sector: "Geotechnical Engineering"
    years: [2025]
    professor: "Daniela Boldini"
    description: |
      This 20-hour course is designed to provide a comprehensive understanding, at the post-graduate level, of the key aspects of saturated soil modelling 
      using the Finite Element method. It begins by introducing the field equations that govern the interaction between soil skeleton and pore fluid under 
      static conditions, followed by their finite element discretization and solution. The course also delves into the implementation of soil constitutive 
      laws at the level of Gauss integration points, encompassing both common explicit and implicit numerical algorithms. The scope of the governing equations 
      is then expanded to cover dynamic conditions, offering insights into addressing earthquake geomechanical problems. In the final session, the course explores 
      relevant challenges in practical applications, including considerations such as 2D versus 3D schematization, initial and boundary conditions, staged construction, 
      and soil-structure problems, illustrated with practical examples.
    program: |
      Lecture 1: A review of finite element theory for linear and non-linear materials
      
      Lecture 2: Pore pressure calculation, seepage and consolidation
      
      Lecture 3: Numerical implementation of soil constitutive laws 
      
      Lecture 4: Seismic geotechnical problems
      
      Lecture 5: Relevant issues in practical applications

  - id: B10
    name: "Soil Structure Interaction"
    phase: B
